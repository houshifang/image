<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image2 · AI 视觉灵感库</title>
    <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#" aria-label="Image2 首页">
        <img class="brand-logo" src="./assets/logo.svg" alt="" width="40" height="40" />
        <span class="brand-name">Image2 Hub</span>
      </a>
      <nav class="primary-nav" id="primaryNav" aria-label="一级分类">
        <span class="nav-indicator" id="navIndicator" aria-hidden="true"></span>
      </nav>
      <div class="topbar-actions">
        <a class="topbar-link topbar-star" id="topbarStar" href="https://github.com/houshifang/image" target="_blank" rel="noopener noreferrer" aria-label="在 GitHub 上 Star" title="Star on GitHub">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.4 3-.405 1.02.005 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
          <span class="topbar-star-label">Star</span>
          <span class="topbar-star-count" id="topbarStarCount" aria-hidden="true">—</span>
        </a>
        <a class="topbar-link" href="https://x.com/faaaannng" target="_blank" rel="noopener noreferrer" aria-label="作者 X 主页" title="X / Twitter">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/>
          </svg>
        </a>
        <a class="topbar-link topbar-link-text" href="https://fanghome.netlify.app/" target="_blank" rel="noopener noreferrer">联系作者</a>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" aria-label="二级分类">
        <div class="sub-wrap">
          <span class="sub-pill" id="subPill" aria-hidden="true"></span>
          <ul class="sub-nav" id="subNav"></ul>
        </div>
      </aside>

      <main class="content">
        <div class="grid" id="grid" aria-live="polite"></div>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite">已复制提示词</div>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="查看大图" hidden>
      <button class="lightbox-close" id="lightboxClose" type="button" aria-label="关闭大图">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6L18 18M18 6L6 18" />
        </svg>
      </button>
      <button class="lightbox-nav lightbox-prev" id="lightboxPrev" type="button" aria-label="上一张">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 5L8 12L15 19" />
        </svg>
      </button>
      <button class="lightbox-nav lightbox-next" id="lightboxNext" type="button" aria-label="下一张">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 5L16 12L9 19" />
        </svg>
      </button>
      <div class="lightbox-stage">
        <figure class="lightbox-figure">
          <div class="lightbox-image-wrap">
            <img class="lightbox-image" id="lightboxImage" alt="" />
          </div>
          <figcaption class="lightbox-caption">
            <div class="lightbox-caption-head">
              <span class="lightbox-caption-title">提示词</span>
              <span class="lightbox-counter" id="lightboxCounter"></span>
            </div>
            <p class="lightbox-prompt" id="lightboxPrompt"></p>
            <div class="lightbox-actions">
              <button class="lightbox-copy" id="lightboxCopy" type="button">复制提示词</button>
            </div>
          </figcaption>
        </figure>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
    <script src="./src/script.js" defer></script>
  </body>
</html>
